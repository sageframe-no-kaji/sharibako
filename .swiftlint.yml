# .swiftlint.yml
#
# Ho System SwiftLint baseline. Strict ruleset with warning threshold
# initially relaxed so the first month doesn't drown in warnings — tighten
# (lower the threshold, opt rules into `only_rules`) as the codebase matures.
#
# Install: brew install swiftlint
# Run:     swiftlint lint --strict

# Paths
included:
  - Sources
  - Tests
excluded:
  - .build
  - .swiftpm
  - DerivedData
  - Packages

# Severity baseline — initial onboarding: warnings become errors above this count.
# Tighten to 0 once the codebase is clean and stays clean.
warning_threshold: 50

# Default rules: opt-in everything reasonable.
opt_in_rules:
  - array_init
  - attributes
  - balanced_xctest_lifecycle
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_object_literal
  - discouraged_optional_boolean
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - missing_docs
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - nimble_operator
  - nslocalizedstring_key
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - static_operator
  - strict_fileprivate
  - test_case_accessibility
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  - todo                    # TODO/FIXME stay visible; don't lint them
  - line_length             # swift-format owns this
  - sorted_imports          # swift-format's OrderedImports owns this; the two conflict
                            # (sorted_imports = alphabetical; OrderedImports = regular before @testable)

# Analyzer rules (run via `swiftlint analyze`, not regular `lint`).
# Add deliberately; these need a compiled build to evaluate.
analyzer_rules:
  - unused_declaration
  - unused_import

# Per-rule tuning
identifier_name:
  min_length: 2
  max_length:
    warning: 50
    error: 80
  excluded:
    - id
    - x
    - y
    - z
    - i
    - to
    - at

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 80

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 12
  error: 20
