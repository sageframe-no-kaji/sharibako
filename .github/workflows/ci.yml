name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6.2+)
        run: |
          # swift-log 1.14.0 requires swift-tools-version 6.2; select the newest available
          # Xcode 16.x that provides Swift 6.2+. Fall back through versions to Xcode 16.0.
          selected=""
          for v in 16.4 16.3 16.2 16.1 16; do
            path="/Applications/Xcode_${v}.app"
            if [ -d "$path" ]; then
              sudo xcode-select -s "$path"
              selected="$path"
              break
            fi
          done
          if [ -z "$selected" ]; then
            echo "No Xcode 16.x found — using default Xcode"
          else
            echo "Selected: $selected"
          fi
          swift --version

      - name: Install swift-format, SwiftLint, and age
        run: |
          brew install swift-format swiftlint age
          swift-format --version
          swiftlint version
          age --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Lint — swift-format
        run: swift-format lint --recursive --strict Sources Tests

      - name: Lint — SwiftLint
        run: swiftlint lint --strict --quiet

      - name: Build
        run: swift build -Xswiftc -warnings-as-errors

      - name: Test with coverage
        run: swift test --enable-code-coverage -Xswiftc -warnings-as-errors

      - name: Enforce 90% line coverage floor
        run: |
          PROFDATA=$(find .build -name "default.profdata" | head -1)
          XCTEST_BUNDLE=$(find .build -name "SharibakoPackageTests.xctest" -type d | head -1)
          XCTEST_BINARY="$XCTEST_BUNDLE/Contents/MacOS/SharibakoPackageTests"
          if [ -z "$PROFDATA" ] || [ ! -f "$XCTEST_BINARY" ]; then
            echo "Could not locate coverage artifacts"
            echo "  profdata: $PROFDATA"
            echo "  test binary: $XCTEST_BINARY"
            exit 1
          fi
          # Named per-file exclusions (ho-04.8) — the mechanical counterpart of
          # the closed hos' comment-based coverage exclusions. Each file below
          # is unreachable in CI by design, not under-tested:
          #   KeychainAgeKeyProvider — every path needs the macOS Keychain +
          #     Touch ID entitlement, which only the signed app-bundle install
          #     has; a bare CI test binary cannot reach it (see CLAUDE.md,
          #     "Keychain dogfood gate").
          #   ExecReplace — execve() on success replaces the process image and
          #     never returns, so the success path cannot run in a test without
          #     nuking the test runner; the chdir/execve failure branches only
          #     surface on the dogfood gate (a real terminal). The tested
          #     decision logic (scope resolution, decrypt, env composition) lives
          #     in RunCommand._run, which returns RunOutcome.ready instead of
          #     exec-ing and is NOT excluded (ho-04.13, superseding the ho-04.12
          #     SignalForwarder parent, now pinned at tag
          #     parked/run-signal-forwarder). The testable seam TempKeySignalGuard
          #     is deliberately NOT excluded.
          #   TerminalDetector — isatty() answers for CI's pipes are constant,
          #     so the interactive branch can never execute.
          #   SecureValuePrompt — echo-off entry requires a controlling
          #     terminal (termios against a real TTY); under CI's pipes the
          #     default prompt is nil and no path in the file can run
          #     (ho-04.11, same class as TerminalDetector).
          #   GUIAgeKeyProvider — the Workshop's own Keychain adapter (ho-05
          #     Decision 1; mirrors KeychainAgeKeyProvider and shares its
          #     justification: the Keychain path needs the signed app bundle +
          #     Touch ID, unreachable from a bare CI test binary).
          #     Dogfood-verified at the ho-05 signed-install gate.
          #   WorkshopWindow, ScopeSidebar, Sources/Sharibako/App.swift —
          #     SwiftUI View/App declarative bodies, which only execute inside
          #     a launched app; not headlessly drivable (ho-05 Decision 8).
          #     All branching they render lives in WorkshopModel and
          #     WorkshopConfig, which are NOT excluded and carry real coverage.
          #   SecretList — SwiftUI declarative body; center-column secret list,
          #     driven by WorkshopModel.secrets (not excluded); not headlessly
          #     drivable (ho-05 Decision 8).
          #   SecretDetail — SwiftUI declarative body; detail-pane reveal UI and
          #     edit affordances (AT-03), driven by WorkshopModel.revealedValue/
          #     history/pendingDiff (not excluded); not headlessly drivable
          #     (ho-05 Decision 8).
          #   AddScopeSheet, AddSecretSheet, AddSharedEntrySheet — SwiftUI
          #     create-form sheets (ho-05 AT-03), now hosted in auxiliary
          #     Window scenes opened via openWindow (ho-06.1 AT-03 Decision 6);
          #     validation state is simple boolean guards from
          #     VaultCore.isValidIdentifier (not excluded). Submitted work
          #     routes through WorkshopModel intents (not excluded); the form
          #     bodies are declarative bindings, not headlessly drivable
          #     (ho-05 Decision 8).
          #   EnvPreviewSheet — SwiftUI declarative body; renders the
          #     Materializer.preview result (ho-06.1 AT-03 Decision 5), driven
          #     by WorkshopModel.envPreview (not excluded); not headlessly
          #     drivable (ho-05 Decision 8).
          #   RevealableSecureField — SwiftUI declarative body; the
          #     SecureField/TextField eye-toggle shared by Add Secret, Add
          #     Shared Entry, and the rotate field (ho-06.1 AT-03 Decision 5).
          #     All state is local @State (isRevealed) with no branching logic
          #     to test independently of rendering; not headlessly drivable
          #     (ho-05 Decision 8).
          #   AuxiliaryWindowChrome — AppKit window-chrome accessor for the Add
          #     windows (hides minimize/zoom; ho-06.1 gate finding). Reaches a
          #     live NSWindow, which only exists inside a launched app; not
          #     headlessly drivable (ho-05 Decision 8).
          #   SettingsScene — SwiftUI declarative body; the native Settings
          #     scene's appearance Picker (ho-06.2 AT-03 Decision 4), bound to
          #     @AppStorage. The tested logic — the appearance ↔ ColorScheme?
          #     mapping — lives in AppAppearance (NOT excluded); the scene body
          #     is not headlessly drivable (ho-05 Decision 8).
          #   ActionPanel — SwiftUI declarative body; the right-side action
          #     panel (ho-06.5 Decision 1). Every verb routes through
          #     WorkshopModel's tested intents and disabled reasons (NOT
          #     excluded); the panel body is titled buttons and a Picker bound
          #     to @AppStorage, not headlessly drivable (ho-05 Decision 8).
          # The 90% floor applies to everything OUTSIDE this list. Additions
          # require the same justification these entries carry.
          EXCLUDED="KeychainAgeKeyProvider|ExecReplace|TerminalDetector|SecureValuePrompt|GUIAgeKeyProvider|WorkshopWindow|ScopeSidebar|Sources/Sharibako/App.swift|SecretList|SecretDetail|AddScopeSheet|AddSecretSheet|AddSharedEntrySheet|EnvPreviewSheet|RevealableSecureField|AuxiliaryWindowChrome|SettingsScene|ActionPanel"
          xcrun llvm-cov report \
            -instr-profile="$PROFDATA" \
            "$XCTEST_BINARY" \
            --use-color=false \
            --ignore-filename-regex=".build|Tests|checkouts|${EXCLUDED}"
          COVERAGE=$(xcrun llvm-cov report \
            -instr-profile="$PROFDATA" \
            "$XCTEST_BINARY" \
            --use-color=false \
            --ignore-filename-regex=".build|Tests|checkouts|${EXCLUDED}" \
            | tail -1 \
            | awk '{print $(NF-3)}' \
            | sed 's/%//')
          echo ""
          echo "Line coverage: ${COVERAGE}%"
          if awk -v c="$COVERAGE" 'BEGIN { exit !(c < 90) }'; then
            echo "Coverage ${COVERAGE}% is below the 90% floor"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets the 90% floor"
