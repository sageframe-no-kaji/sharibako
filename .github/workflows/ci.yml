name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6.2+)
        run: |
          # swift-log 1.14.0 requires swift-tools-version 6.2; select the newest available
          # Xcode 16.x that provides Swift 6.2+. Fall back through versions to Xcode 16.0.
          selected=""
          for v in 16.4 16.3 16.2 16.1 16; do
            path="/Applications/Xcode_${v}.app"
            if [ -d "$path" ]; then
              sudo xcode-select -s "$path"
              selected="$path"
              break
            fi
          done
          if [ -z "$selected" ]; then
            echo "No Xcode 16.x found — using default Xcode"
          else
            echo "Selected: $selected"
          fi
          swift --version

      - name: Install swift-format and SwiftLint
        run: |
          brew install swift-format swiftlint
          swift-format --version
          swiftlint version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Lint — swift-format
        run: swift-format lint --recursive --strict Sources Tests

      - name: Lint — SwiftLint
        run: swiftlint lint --strict --quiet

      - name: Build
        run: swift build

      - name: Test
        run: swift test
